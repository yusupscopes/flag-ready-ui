services:
  flag-ready-react-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: flag-ready-react-app
    ports:
      - "8080:8080"

  flag-ready-react-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: .
          target: /app

  flag-ready-react-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "test"]
